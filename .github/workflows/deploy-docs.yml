name: Deploy Docs

# Build the VitePress documentation site (docs/) and publish it to GitHub Pages, which is what
# serves azphalt.org (see docs/public/CNAME). Runs on any push to main that touches the docs or this
# workflow, and on demand. The DNS cutover — pointing azphalt.org at GitHub Pages and enabling Pages
# for the repo (Settings → Pages → Source: GitHub Actions) — is a one-time manual step; until then this
# builds and uploads the artifact without affecting the live domain.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'spec/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Least privilege for a Pages deploy: read the repo, write the Pages artifact, mint the deploy token.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; a newer push supersedes an older run rather than racing it.
concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      # The docs workspace is self-contained (VitePress + Vue); install just it, then build.
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter docs build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
