name: Release

# Changesets-driven release. On every push to main this either opens/updates a
# "Version Packages" PR (accumulating the pending changesets into version bumps +
# changelogs) or, once that PR is merged, publishes the bumped packages to npm.
on:
  push:
    branches: [main]

# Never let two releases publish concurrently.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version PR / tags
      pull-requests: write # open the version PR
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Create the Version PR, or publish to npm
        uses: changesets/action@v1
        with:
          # Bump versions + changelogs (opens/updates the "Version Packages" PR).
          version: pnpm run version
          # After that PR merges, build + test + publish the bumped packages.
          publish: pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # THE ONE HUMAN STEP: set an npm automation token as the NPM_TOKEN repo secret.
          # Until it exists, the publish step cannot authenticate (versioning still works).
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
