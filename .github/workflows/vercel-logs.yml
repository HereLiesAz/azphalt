name: Vercel Build Logs (diagnostic)

# Manually-triggered diagnostic: pulls the latest (or a named) Vercel deployment
# for the storefront project and prints its build logs, so a failed build's real
# error is visible in the Actions log. Read-only — it never deploys.
on:
  workflow_dispatch:
    inputs:
      deployment:
        description: "Deployment id or url (blank = latest for the storefront project)"
        required: false

permissions:
  contents: read

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Vercel deployment build logs
        env:
          TOKEN: ${{ secrets.VERCEL_API_KEY }}
          DEP_INPUT: ${{ inputs.deployment }}
        run: |
          set -uo pipefail
          API=https://api.vercel.com
          auth=(-H "Authorization: Bearer $TOKEN")

          echo "token length: ${#TOKEN} (should be ~24 for a Vercel token)"
          echo "=== whoami (/v2/user) ==="
          code=$(curl -s -o /tmp/u.json -w "%{http_code}" "${auth[@]}" "$API/v2/user")
          echo "/v2/user -> HTTP $code"
          head -c 600 /tmp/u.json; echo

          echo "=== teams (/v2/teams) ==="
          teamsRaw=$(curl -s "${auth[@]}" "$API/v2/teams")
          echo "$teamsRaw" | jq -r '.teams[]? | "\(.id)  \(.slug)  \(.name)"' 2>/dev/null || echo "$teamsRaw" | head -c 800

          # Try each known scope: personal, then every team, then the slug from the deploy URL.
          slugFromUrl="azs-projects-e393a284"
          scopes=$(echo "$teamsRaw" | jq -r '.teams[]?.id' 2>/dev/null)
          echo "=== searching for the storefront project across scopes ==="
          pid=""; teamId=""
          for tid in "" $scopes; do
            q="limit=100"; [ -n "$tid" ] && q="$q&teamId=$tid"
            resp=$(curl -s "${auth[@]}" "$API/v9/projects?$q")
            names=$(echo "$resp" | jq -r '.projects[]?.name' 2>/dev/null | tr '\n' ' ')
            echo "scope [${tid:-personal}]: ${names:-<none/err>}"
            hit=$(echo "$resp" | jq -r '.projects[]? | select(.name|test("storefront|azphalt";"i")) | .id' 2>/dev/null | head -1)
            if [ -n "$hit" ]; then pid="$hit"; teamId="$tid"; break; fi
          done
          # Fallback: resolve the team by the slug embedded in the deploy URL.
          if [ -z "$pid" ]; then
            resp=$(curl -s "${auth[@]}" "$API/v9/projects?limit=100&slug=$slugFromUrl")
            pid=$(echo "$resp" | jq -r '.projects[]? | select(.name|test("storefront|azphalt";"i")) | .id' 2>/dev/null | head -1)
            tid2=$(curl -s "${auth[@]}" "$API/v2/teams?slug=$slugFromUrl" | jq -r '.id // .teams[0].id // empty' 2>/dev/null)
            [ -n "$tid2" ] && teamId="$tid2"
          fi
          tq=""; [ -n "$teamId" ] && tq="&teamId=$teamId"
          if [ -z "$pid" ]; then echo "Could not find the storefront project in any accessible scope."; exit 1; fi
          echo "project: $pid   team: ${teamId:-<personal>}"

          if [ -n "$DEP_INPUT" ]; then
            did="$DEP_INPUT"
          else
            deps=$(curl -s "${auth[@]}" "$API/v6/deployments?projectId=$pid&limit=1$tq")
            did=$(echo "$deps" | jq -r '.deployments[0].uid // empty')
            echo "state:  $(echo "$deps" | jq -r '.deployments[0].state // .deployments[0].readyState // "?"')"
            echo "url:    https://$(echo "$deps" | jq -r '.deployments[0].url // "?"')"
            echo "commit: $(echo "$deps" | jq -r '.deployments[0].meta.githubCommitSha // "?"' | cut -c1-7)"
          fi
          echo "deployment: $did"
          echo "=================== BUILD LOGS ==================="
          logs=$(curl -s "${auth[@]}" "$API/v3/deployments/$did/events?builds=1&limit=1000$tq")
          out=$(echo "$logs" | jq -r '.[]? | (.payload.text // .text // empty)' 2>/dev/null || true)
          if [ -n "$out" ]; then echo "$out"; else echo "(no parsed text — raw payload:)"; echo "$logs" | head -c 4000; fi
          echo ""
          echo "================================================="
